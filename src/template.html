<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <header>
    <p>Todo</p>
  </header>

  <div id="app">
    <aside id="sidebar">
      <div id="sidebar-title home">
        <p>Home</p>
      </div>

      <nav class="sidebar-nav" id="nav-home">
        <ul>
          <li><a href="#all-task">All Tasks</a></li>
          <li><a href="#today-task">Today</a></li>
          <li><a href="#sevenD-task">Next 7 Days</a></li>
        </ul>
      </nav>

      <div id="sidebar-title projects">
        <p>Projects</p>
        <button id="add-project">Add Project</button>
      </div>

      <nav class="sidebar-nav" id="nav-projects">

      </nav>
    </aside>

    <main>
      <div id="section-title"></div>

      <div id="content">

        <div class="todo-card">

          <div class="todo-left">
            <button class="toggle-btn" aria-label="Mark as complete"></button>
            <p class="todo-title">Todo Name</p>
          </div>

          <div class="todo-right">
            <button class="details-btn">details</button>

            <time datetime="2026-07-22">22-07-2026</time>
  
            <button class="edit-btn">edit</button>
            <button class="delete-btn">delete</button>
          </div>

        </div>

      </div>
    </main>

  </div>


  <footer>
    <p>Made by silc-o</p>
  </footer>
  
</body>
</html>
